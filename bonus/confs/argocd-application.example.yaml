# Example declarative Argo CD Application (optional).
# The bonus/scripts/setup.sh path uses the Argo CD CLI instead, but this file documents the exact spec.
#
# Apply (after the GitLab repo credentials are registered for the same repoURL):
#   kubectl apply -n argocd -f bonus/confs/argocd-application.example.yaml
#
# Repository credentials are NOT embedded here; register the repo with:
#   argocd repo add <repoURL> --username root --password <gitlab_root_password> --insecure-skip-server-verification
# or create a Secret labeled argocd.argoproj.io/secret-type: repository (see argocd-repo-secret.example.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wil-playground
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://gitlab-webservice-default.gitlab.svc.cluster.local:8080/root/iot-gitops.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
