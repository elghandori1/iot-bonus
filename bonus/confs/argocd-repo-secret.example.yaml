# Example Argo CD repository credential Secret (optional alternative to `argocd repo add`).
# Replace GITLAB_ROOT_PASSWORD_PLACEHOLDER before applying.
#
# kubectl apply -n argocd -f bonus/confs/argocd-repo-secret.example.yaml
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-repo-creds
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: http://gitlab-webservice-default.gitlab.svc.cluster.local:8080/root/iot-gitops.git
  username: root
  password: GITLAB_ROOT_PASSWORD_PLACEHOLDER
